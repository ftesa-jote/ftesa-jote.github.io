<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ftesa Jote - a simple online invitation website." />
    <meta name="theme-color" content="#f6e7df" />
    <title>Ftesa Jote</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card" aria-labelledby="hero-title">
        <p class="eyebrow">Online invitation website</p>
        <h1 id="hero-title">Ftesa Jote</h1>
        <p class="lead">
          A clean, modern invitation landing page for your event details, RSVP link,
          and a first look that feels warm and personal.
        </p>

        <div class="cta-row">
          <a class="primary-btn" href="#details">View invitation</a>
          <a class="secondary-btn" href="mailto:hello@ftesa-jote.com">Contact us</a>
        </div>

        <div class="details-grid" id="details">
          <article>
            <span>Date</span>
            <strong>Coming soon</strong>
          </article>
          <article>
            <span>Location</span>
            <strong>Online</strong>
          </article>
          <article>
            <span>RSVP</span>
            <strong>Simple link</strong>
          </article>
        </div>
      </section>

      <aside class="art-card" aria-label="Invitation illustration">
        <img src="assets/invite-illustration.svg" alt="Minimal invitation illustration" />
      </aside>
    </main>
  </body>
</html>
